name: wip-android

run-name: wip-android-build

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch
        required: true
        default: main

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: setup-nodeJS
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: yarn

      - name: setup-java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: install-dependencies
        run: |
          npm install -g eas-cli
          yarn install --frozen-lockfile

      - name: versioning
        run: |
          VERSION=$(jq -r '.expo.version' app.json)
          BUILD=${{ 100 + github.run_number }}

          jq \
            --arg build "$BUILD" \
            '
            .expo.android.versionCode=($build|tonumber)
            ' \
            app.json > tmp.json

          mv tmp.json app.json

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD=$BUILD" >> $GITHUB_ENV

          echo "Build Version:"
          cat app.json | jq '.expo.android.versionCode'

      - name: build-aab-local
        env:
          EAS_LOCAL_BUILD_SKIP_CLEANUP: 1
        run: |
          eas build \
            -p android \
            --profile production \
            --local \
            --non-interactive

          cp build/*.aab \
            wip-${VERSION}-${BUILD}.aab

      - name: build-apk-local
        env:
          EAS_LOCAL_BUILD_SKIP_CLEANUP: 1
        run: |
          eas build \
            -p android \
            --profile production-apk \
            --local \
            --non-interactive

          cp build/*.apk \
            wip-${VERSION}-${BUILD}.apk

      - name: upload-artifact
        uses: actions/upload-artifact@v5
        with:
          name: wip-${{ env.VERSION }}-${{ env.BUILD }}
          path: |
            wip-${{ env.VERSION }}-${{ env.BUILD }}.aab
            wip-${{ env.VERSION }}-${{ env.BUILD }}.apk
