name: wip-android

run-name: wip-android-build

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch
        required: true
        default: main

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: setup-nodeJS
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: yarn

      - name: install-dependencies
        run: |
          npm install -g eas-cli
          yarn install

      - name: versioning
        run: |
          VERSION=$(jq -r '.expo.version' app.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: build-aab
        run: |
          eas build -p android --profile production --non-interactive --wait --json > aab.json
          BUILD_URL=$(jq -r '.[0].artifacts.buildUrl' aab.json)
          curl -L -o wip-${{ env.VERSION }}-${{ github.run_number }}.aab "$BUILD_URL"
      
      - name: build-apk
        run: |
          eas build -p android --profile production-apk --non-interactive --wait --json > apk.json
          BUILD_URL=$(jq -r '.[0].artifacts.buildUrl' apk.json)
          curl -L -o wip-${{ env.VERSION }}-${{ github.run_number }}.apk "$BUILD_URL"

      - uses: actions/upload-artifact@v5
        with:
          name: wip-${{ env.VERSION }}-${{ github.run_number }}
          path: |
            wip-${{ env.VERSION }}-${{ github.run_number }}.aab
            wip-${{ env.VERSION }}-${{ github.run_number }}.apk