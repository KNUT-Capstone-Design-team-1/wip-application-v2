name: wip-android

run-name: wip-android-build

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: setup-nodeJS
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: yarn

      - name: install-dependencies
        run: |
          npm install -g eas-cli
          yarn install

      - name: versioning
        run: |
          VERSION=$(jq -r '.expo.version' app.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build -p android --profile production --non-interactive --json > build.json
          BUILD_URL=$(jq -r '.[0].artifacts.buildUrl' build.json)
          curl -L -o wip-${{ env.VERSION }}-${{ github.run_number }}.aab "$BUILD_URL"

      - uses: actions/upload-artifact@v5
        with:
          name: wip-${{ env.VERSION }}-${{ github.run_number }}
          path: wip-${{ env.VERSION }}-${{ github.run_number }}.aab